    x="0" 
    y="50" 
    font-family="'Space Grotesk', sans-serif" 
    font-weight="300" 
    font-size="52" 
    fill="url(#girgitGradient)" 
    letter-spacing="-1.5px"
  >
    girgit.
  </text>
</svg>
